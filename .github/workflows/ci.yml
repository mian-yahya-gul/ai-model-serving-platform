name: CI - Test & Build Serving API

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export model artifact
        run: python models/train_export_model.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t churn-serving-api:ci .
